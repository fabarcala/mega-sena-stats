name: Atualizar dados Mega Sena

on:
  schedule:
    # Terça, Quinta e Sábado às 22h (GMT-3) = 01h UTC do dia seguinte
    - cron: "0 1 * * 3,5,0"
  workflow_dispatch: # permite rodar manualmente pelo GitHub

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install requests

      - name: Rodar script de coleta
        run: python scripts/collect_data.py

      - name: Commitar e publicar stats.json atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/stats.json
          git diff --staged --quiet || git commit -m "chore: atualiza dados [$(date '+%d/%m/%Y')]"
          git push
